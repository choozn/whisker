# Header
title="Audio Utils"
bundle_id="audio"

# Packages
packages=(
    "pipewire"
    "pipewire-jack"
    "pipewire-audio"
    "pipewire-pulse"
    "pipewire-alsa"
    "wireplumber"
    "pulsemixer"
    "alsa-utils"
    "helvum"
)

# Config files
# Always specify the full path, not just the folder!
files=(
)

# Pre installation
pre() {
    sudo pacman --no-confirm -R jack2
}

# Post installation
post() {
    xdg-mime default alacritty.desktop x-scheme-handler/terminal
}
